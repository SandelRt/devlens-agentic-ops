# DevLens macros — reusable SPL building blocks
# Reference with `macroname` in SPL searches

# Base search for HTTP access logs (works with both indexed data and inputlookup)
[devlens_access_logs]
definition = inputlookup devlens_access_logs.csv | eval _time=strptime(_time, "%Y-%m-%dT%H:%M:%S.%3NZ")
iseval = 0

# Error rate calculation for a time window
[devlens_error_rate(1)]
args = timerange
definition = `devlens_access_logs` | where _time > relative_time(now(), "$timerange$") | stats count as total, count(eval(status>=500)) as errors by service | eval error_pct=round(errors/total*100,2)
iseval = 0

# P99 latency by service
[devlens_latency(1)]
args = timerange
definition = `devlens_access_logs` | where _time > relative_time(now(), "$timerange$") | stats p99(response_time_ms) as p99_ms, avg(response_time_ms) as avg_ms by service
iseval = 0

# Service health score (0-100)
[devlens_health_score(1)]
args = timerange
definition = `devlens_error_rate($timerange$)` | eval health_score=round((1-errors/total)*100,1) | eval slo_status=case(health_score>=99,"HEALTHY",health_score>=95,"DEGRADED",1==1,"CRITICAL")
iseval = 0
