# DevLens — Pre-built Observability Saved Searches
# These serve as both ready-to-use monitoring queries AND as semantic metadata
# that makes DevLens "Agent-Ready" — AI assistants can discover these via the MCP Server.

# --------------------------------------------------------------------------
# HTTP Error Rate Monitoring
# --------------------------------------------------------------------------
[DevLens - HTTP Error Rate by Service]
search = index=* status>=500 | stats count as total_requests, count(eval(status>=500)) as server_errors by service | eval error_rate_pct=round(server_errors/total_requests*100,2) | where error_rate_pct > 0 | sort -error_rate_pct
description = Monitors HTTP 5xx error rates per service. Alert when error_rate_pct > 5 indicates a service-level issue requiring investigation.
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = 1
alert.condition = search count > 0
cron_schedule = */5 * * * *
enableSched = 1

[DevLens - Top Failing Endpoints]
search = index=* status>=400 | stats count as errors, dc(user_id) as users_affected by uri_path, service, status | sort -errors | head 20
description = Identifies the most frequently failing API endpoints and how many unique users are impacted. Used for prioritizing bug fixes.
dispatch.earliest_time = -1h
dispatch.latest_time = now

[DevLens - Error Spike Detection]
search = index=* status>=500 | timechart span=1m count as errors | streamstats window=10 avg(errors) as baseline, stdev(errors) as stddev | eval is_spike=if(errors > baseline + (3 * stddev), "YES", "no") | where is_spike="YES"
description = Detects sudden spikes in error rates using statistical analysis (3-sigma threshold). Fires when errors significantly exceed the 10-minute baseline.
dispatch.earliest_time = -30m
dispatch.latest_time = now

# --------------------------------------------------------------------------
# Latency Monitoring
# --------------------------------------------------------------------------
[DevLens - Latency Percentiles by Service]
search = index=* response_time_ms>0 | stats avg(response_time_ms) as avg_ms, p50(response_time_ms) as p50_ms, p95(response_time_ms) as p95_ms, p99(response_time_ms) as p99_ms, max(response_time_ms) as max_ms by service | sort -p99_ms
description = Response time distribution by service. p99 > 2000ms indicates a service is significantly degraded for the slowest users.
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = 1

[DevLens - Latency Regression Detection]
search = index=* response_time_ms>0 | timechart span=5m p99(response_time_ms) as p99_ms by service | streamstats window=6 avg(p99_ms) as rolling_p99 | eval degraded=if(p99_ms > rolling_p99 * 2, "YES", "no") | where degraded="YES"
description = Detects when a service's p99 latency doubles compared to its recent baseline, indicating a latency regression.
dispatch.earliest_time = -1h
dispatch.latest_time = now

# --------------------------------------------------------------------------
# Deployment Tracking
# --------------------------------------------------------------------------
[DevLens - Recent Deployment Events]
search = index=* sourcetype=deployment | stats count, values(status) as statuses, values(deployed_by) as deployers by service, version | sort -_time | head 20
description = Shows recent deployments across all services including who deployed and whether the deployment succeeded.
dispatch.earliest_time = -24h
dispatch.latest_time = now

[DevLens - Deployment Impact Analysis]
search = index=* | eval deploy_window=if(_time > relative_time(now(), "-2h"), "post_deploy", "pre_deploy") | stats avg(response_time_ms) as avg_ms, count(eval(status>=500)) as errors, count as requests by service, version, deploy_window | eval error_rate=round(errors/requests*100,2) | sort service, deploy_window
description = Compares error rate and latency before/after the most recent deployment. High delta in post_deploy indicates a regression.
dispatch.earliest_time = -4h
dispatch.latest_time = now

# --------------------------------------------------------------------------
# Service Health Overview
# --------------------------------------------------------------------------
[DevLens - Service Health Dashboard]
search = index=* | stats count as requests, count(eval(status>=500)) as errors, avg(response_time_ms) as avg_ms, p99(response_time_ms) as p99_ms, dc(user_id) as unique_users by service | eval health_score=round((1-(errors/requests))*100,1) | eval slo_status=case(health_score>=99, "HEALTHY", health_score>=95, "DEGRADED", health_score<95, "CRITICAL") | sort health_score
description = Single-pane-of-glass service health overview. Shows request volume, error rate, latency, and SLO compliance per service.
dispatch.earliest_time = -15m
dispatch.latest_time = now

[DevLens - User Impact Assessment]
search = index=* status>=500 | stats dc(user_id) as affected_users, count as failed_requests by service | sort -affected_users | head 10
description = Measures real user impact of current issues by counting unique users experiencing errors. Helps prioritize incident response.
dispatch.earliest_time = -15m
dispatch.latest_time = now

# --------------------------------------------------------------------------
# Infrastructure & Resources
# --------------------------------------------------------------------------
[DevLens - Resource Saturation Alert]
search = sourcetype=metrics (cpu_percent>80 OR memory_percent>90 OR disk_io_wait>50) | stats max(cpu_percent) as max_cpu, max(memory_percent) as max_mem, max(disk_io_wait) as max_disk_wait by host | eval saturation_level=case(max_cpu>90 OR max_mem>95, "CRITICAL", max_cpu>80 OR max_mem>85, "WARNING", true(), "OK") | where saturation_level!="OK"
description = Detects hosts approaching resource saturation. CPU > 80%, Memory > 90%, or high disk IO wait are leading indicators of performance issues.
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert.track = 1
cron_schedule = */5 * * * *
enableSched = 1

# --------------------------------------------------------------------------
# DevLens Agent Activity Log
# --------------------------------------------------------------------------
[DevLens - Agent Investigation Log]
search = index=devlens_internal sourcetype=devlens:agent | stats count as investigations, avg(iterations) as avg_iterations, avg(confidence) as avg_confidence by _time, question | sort -_time | head 50
description = Tracks DevLens agent activity: how many investigations ran, average confidence scores, and iteration counts. Used for monitoring and improving DevLens itself.
dispatch.earliest_time = -24h
dispatch.latest_time = now
