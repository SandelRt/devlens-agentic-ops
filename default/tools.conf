# DevLens MCP Tool Definitions
# Exposes DevLens capabilities as MCP tools so any AI assistant (Claude, GPT, etc.)
# can interact with your Splunk observability data through the MCP Server.
#
# Install the Splunk MCP Server from Splunkbase, then DevLens tools are automatically
# discoverable by connected AI agents.
#
# Reference: https://splunkbase.splunk.com/ (search "MCP Server for Splunk Platform")

[tool:devlens_investigate]
description = Investigate an observability question about application performance, errors, or system health using DevLens AI. Provide a natural language question and the agent will autonomously query Splunk, analyze the data, and return a root cause analysis with recommendations.
endpoint = /services/devlens/investigate
method = POST
input_schema = devlens_investigate_schema
output_format = json

[tool:devlens_spl_query]
description = Generate an expert Splunk SPL query from a natural language description. Useful for developers who want to explore data without knowing SPL syntax.
endpoint = /services/devlens/generate_spl
method = POST
input_schema = devlens_spl_schema
output_format = json

[tool:devlens_health_check]
description = Get a quick health summary of all services currently sending data to Splunk. Returns error rates, latency, and throughput per service.
endpoint = /services/devlens/health_check
method = GET
input_schema = devlens_health_schema
output_format = json

[tool:devlens_deployment_impact]
description = Analyze the impact of a recent deployment. Compares error rates, latency, and throughput before and after a deployment event to detect regressions.
endpoint = /services/devlens/deployment_impact
method = POST
input_schema = devlens_deploy_schema
output_format = json

[tool:devlens_anomaly_detect]
description = Run Splunk's Cisco Deep Time Series model to detect anomalies in a specific metric over time. Returns anomaly score, affected time window, and likely root cause.
endpoint = /services/devlens/anomaly_detect
method = POST
input_schema = devlens_anomaly_schema
output_format = json
